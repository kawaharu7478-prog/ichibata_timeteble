<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>一畑電車 運行表示</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { font-family: sans-serif; }
    .station { font-size: 12px; text-anchor: middle; }
    .line { stroke: black; stroke-width: 2; fill: none; }
    .time-label { font-size: 20px; font-weight: bold; text-anchor: middle; }

    /* 列車アイコンの上下テキスト用スタイル */
    .train-info-text {
      font-size: 10px;
      font-weight: bold;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: black;
    }

    /* 横スクロール対応 */
    #map-container {
      width: 100%;
      overflow-x: auto;
      border: 1px solid #ccc;
    }

    /* 運用投稿フォームのスタイル */
    #post-container {
      margin-bottom: 20px;
      padding: 10px;
      background-color: #f0f0f0;
      border-radius: 5px;
    }
    #post-container select, #post-container button {
      padding: 5px;
      margin-right: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div id="post-container">
    <label for="unyo-select">運用:</label>
    <select id="unyo-select">
      <option value="A">A</option>
      <option value="B">B</option>
      <option value="C">C</option>
      <option value="D出">D出</option>
      <option value="D中">D中</option>
      <option value="D畑">D畑</option>
      <option value="E">E</option>
      <option value="F">F</option>
      <option value="G">G</option>
      <option value="H">H</option>
      <option value="I">I</option>
    </select>

    <label for="train-select">車両:</label>
    <select id="train-select">
      <option value="不明">不明</option>
      <option value="5009">5009</option>
      <option value="1001">1001</option>
      <option value="1002">1002</option>
      <option value="1003">1003</option>
      <option value="7001">7001</option>
      <option value="7002">7002</option>
      <option value="7003">7003</option>
      <option value="7004">7004</option>
      <option value="8001">8001</option>
      <option value="8002">8002</option>
    </select>

    <button id="post-btn">運用投稿</button>
  </div>

  <div id="map-container">
    <svg id="map" height="800"></svg>
  </div>

  <script>
    const svg = d3.select("#map");
    const height = +svg.attr("height");

    // 駅定義・座標計算
    const mainStations = [
      "松江温泉","ガーデン前","朝日ヶ丘","長江","秋鹿町","フォーゲル","高ノ宮","津ノ森","伊野灘",
      "一畑口","園","湖遊館新駅","布崎","雲州平田","旅伏","美談","大寺","川跡",
      "武志","大津町","科学館前","電鉄出雲市"
    ];
    const branchStations = ["川跡","高浜","遥堪","浜山公園北口","出雲大社前"];
    const stationSpacing = 60;
    const mainCoords = mainStations.map((d,i)=>({name:d,x:100+i*stationSpacing,y:200}));
    const kawatoMain = mainCoords.find(s=>s.name==="川跡");
    const branchCoords = branchStations.map((d,i)=>({name:d,x: kawatoMain.x + (i*stationSpacing),y: kawatoMain.y+stationSpacing+50}));
    branchCoords[0].x = kawatoMain.x; branchCoords[0].y = branchCoords[1].y;
    const maxX = Math.max(...[...mainCoords, ...branchCoords].map(d => d.x)) + 200;
    svg.attr("width", maxX);

    // 線と駅の描画
    svg.append("polyline").attr("points", mainCoords.map(d=>`${d.x},${d.y}`).join(" ")).attr("class","line");
    svg.append("polyline").attr("points", branchCoords.map(d=>`${d.x},${d.y}`).join(" ")).attr("class","line");
    svg.selectAll(".station.main").data(mainCoords).enter().append("circle").attr("cx",d=>d.x).attr("cy",d=>d.y).attr("r",5).attr("fill","black");
    svg.selectAll(".station.branch").data(branchCoords).enter().append("circle").attr("cx",d=>d.x).attr("cy",d=>d.y).attr("r",5).attr("fill","black");
    svg.selectAll(".station-label.main").data(mainCoords).enter().append("text").attr("x",d=>d.x).attr("y",d=>d.y-10).text(d=>d.name).attr("class","station");
    svg.selectAll(".station-label.branch").data(branchCoords).enter().append("text").attr("x",d=>d.x).attr("y",d=>d.y+20).text(d=>d.name).attr("class","station");

    function parseTime(val) { if (!val || isNaN(val)) return null; const num = parseInt(val); const hh = Math.floor(num/100); const mm = num % 100; return hh*60+mm; }

    const timeLabel = svg.append("text").attr("x",maxX/2).attr("y",50).attr("class","time-label");

    // 日付管理・データ保持ロジック
    function getTodayString() { const now = new Date(); return now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate(); }
    function loadUnyoData() { const savedDate = localStorage.getItem("unyo_date"); const today = getTodayString(); if (savedDate !== today) { localStorage.setItem("unyo_date", today); localStorage.setItem("unyo_assignments", JSON.stringify({})); return {}; } const assignments = localStorage.getItem("unyo_assignments"); return assignments ? JSON.parse(assignments) : {}; }
    let currentAssignments = loadUnyoData();

    // アイコンの画像パスと、その上に表示するテキストを決定する関数
    function getFormationInfo(train, formationNum, assignments) {
      if (formationNum === 1) {
        const unyoKey = train.formation1; // "A" など
        if (unyoKey && assignments[unyoKey] && assignments[unyoKey] !== "不明") {
          return { src: assignments[unyoKey] + ".png", text: assignments[unyoKey] };
        }
        // 未投稿時は 0000.png を表示し、文字は元の運用名("A"など)を出す
        return { src: "0000.png", text: unyoKey || "" };
      } else if (formationNum === 2) {
        return train.formation2 ? { src: train.formation2 + ".png", text: train.formation2 } : null;
      } else if (formationNum === 3) {
        return train.formation3 ? { src: train.formation3 + ".png", text: train.formation3 } : null;
      }
      return null;
    }

    // 列車読み込み
    d3.csv("trains.csv").then(data=>{
      const trains = data.map(row=>{
        const schedule = {};
        Object.keys(row).forEach(k=>{ 
          if (k!=="train_id" && k!=="train_name" && k!=="direction" && k!=="train_formation1" && k!=="train_formation2" && k!=="train_formation3") { 
            schedule[k] = parseTime(row[k]); 
          } 
        });
        return { 
          id: row.train_id, 
          name: row.train_name, 
          dir: row.direction, 
          formation1: row.train_formation1 ? row.train_formation1.trim() : "", 
          formation2: row.train_formation2 ? row.train_formation2.trim() : "", 
          formation3: row.train_formation3 ? row.train_formation3.trim() : "", 
          schedule: schedule 
        };
      });

      // 列車グループ（g要素）
      const trainElems = svg.selectAll(".train")
        .data(trains).enter()
        .append("g")
        .attr("class","train")
        .attr("transform","translate(-100,-100)");

      // アイコンと上下テキストを格納するコンテナ
      const iconGroup = trainElems.append("g")
        .attr("class", "icon-group")
        .attr("transform", "translate(0, 0)"); // 基準点を合わせるためYは0に

      // 列車ID（常にアイコンの下に1つだけ表示）
      trainElems.append("text")
        .attr("class", "train-info-text")
        .attr("x", 0)
        .attr("y", 22) // アイコン（高さ24）の下側に配置
        .text(d => d.id);

      // アイコン表示と上のテキストの更新処理
      function updateIcons() {
        iconGroup.each(function(d) {
          const g = d3.select(this);
          const iconList = [];
          
          const info1 = getFormationInfo(d, 1, currentAssignments); if (info1) iconList.push(info1);
          const info2 = getFormationInfo(d, 2, currentAssignments); if (info2) iconList.push(info2);
          const info3 = getFormationInfo(d, 3, currentAssignments); if (info3) iconList.push(info3);

          const iconSize = 24;
          const iconSpacing = 4;
          const totalWidth = iconList.length * iconSize + (iconList.length - 1) * iconSpacing;

          // 各編成ごとの要素をまとめるグループ（コンテナ内のコンテナ）をデータバインド
          const itemGroups = g.selectAll("g.icon-item").data(iconList);
          
          // 新しく入ってきた編成データのグループを作成
          const itemGroupsEnter = itemGroups.enter()
            .append("g")
            .attr("class", "icon-item");

          // 新規グループに画像とテキストを追加
          itemGroupsEnter.append("image");
          itemGroupsEnter.append("text").attr("class", "train-info-text");

          // 既存と新規を合流させて位置と中身を更新
          const itemGroupsUpdate = itemGroupsEnter.merge(itemGroups)
            .attr("transform", (info, idx) => {
              const xPos = idx * (iconSize + iconSpacing) - totalWidth / 2;
              return `translate(${xPos}, -12)`; // アイコンのY位置調整
            });

          // 画像の属性更新
          itemGroupsUpdate.select("image")
            .attr("xlink:href", info => info.src)
            .attr("width", iconSize)
            .attr("height", iconSize);

          // アイコン「上」のテキスト(formation)の更新
          itemGroupsUpdate.select("text")
            .attr("x", iconSize / 2)
            .attr("y", -8) // アイコンの上側
            .text(info => info.text);

          itemGroups.exit().remove();
        });
      }

      // 初期描画
      updateIcons();

      // 運用投稿ボタンを押した時の処理
      d3.select("#post-btn").on("click", () => {
        const selectedUnyo = d3.select("#unyo-select").property("value");
        const selectedTrain = d3.select("#train-select").property("value");

        currentAssignments[selectedUnyo] = selectedTrain;
        localStorage.setItem("unyo_assignments", JSON.stringify(currentAssignments));
        
        updateIcons();
      });

      const coords = {};
      [...mainCoords,...branchCoords].forEach(d=>coords[d.name]=d);

      let lastCheckedDate = getTodayString();

      // 1秒ごとの更新ループ
      setInterval(()=>{
        const now = new Date();
        const nowM = now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
        timeLabel.text(d3.timeFormat("%H:%M:%S")(now));

        const todayStr = getTodayString();
        if (todayStr !== lastCheckedDate) { 
          currentAssignments = loadUnyoData(); 
          updateIcons(); 
          lastCheckedDate = todayStr; 
        }

        trains.forEach((train,i)=>{
          const stops = Object.entries(train.schedule).filter(([st,t])=>t!=null);
          stops.sort((a,b)=>a[1]-b[1]);
          let pos=null;
          for (let j=0;j<stops.length-1;j++){
            const [s1,t1]=stops[j]; const [s2,t2]=stops[j+1];
            if (nowM>=t1 && nowM<=t2){
              const p=(nowM-t1)/(t2-t1);
              const c1=coords[s1],c2=coords[s2];
              const x=c1.x+(c2.x-c1.x)*p;
              const y=c1.y+(c2.y-c1.y)*p + (train.dir==="up" ? -30 : 30);
              pos={x,y};
              break;
            }
          }
          if (pos){
            trainElems.filter((d,idx)=>idx===i).attr("transform",`translate(${pos.x},${pos.y})`);
          } else {
            trainElems.filter((d,idx)=>idx===i).attr("transform","translate(-100,-100)");
          }
        });
      },1000);
    });
  </script>
</body>
</html>
